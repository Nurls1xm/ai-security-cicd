services:
  n8n:
    image: n8nio/n8n:latest
    container_name: ai-security-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/webhook}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows
    networks:
      - ai-security-network
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    container_name: ai-security-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - OPAL_CLIENT_URL=http://opal-client:7000
    volumes:
      - jenkins_data:/var/jenkins_home
      - ./jenkins:/var/jenkins_config
    networks:
      - ai-security-network
    restart: unless-stopped

  opal-server:
    image: permitio/opal-server:latest
    container_name: ai-security-opal-server
    ports:
      - "7002:7002"
    environment:
      - OPAL_BROADCAST_URI=postgres://postgres:postgres@postgres:5432/opal
      - UVICORN_NUM_WORKERS=4
      - OPAL_POLICY_REPO_URL=https://github.com/Nurls1xm/ai-security-cicd.git
      - OPAL_POLICY_REPO_MAIN_BRANCH=main
      - OPAL_DATA_CONFIG_SOURCES={"config":{"entries":[{"url":"http://opal-server:7002/policy-data","topics":["policy_data"],"dst_path":"/"}]}}
    networks:
      - ai-security-network
    restart: unless-stopped
    depends_on:
      - postgres

  opal-client:
    image: permitio/opal-client:latest
    container_name: ai-security-opal-client
    ports:
      - "7000:7000"
      - "8181:8181"
    environment:
      - OPAL_SERVER_URL=http://opal-server:7002
      - OPAL_LOG_FORMAT_INCLUDE_PID=true
      - OPAL_INLINE_OPA_LOG_FORMAT=http
    networks:
      - ai-security-network
    restart: unless-stopped
    depends_on:
      - opal-server

  postgres:
    image: postgres:15-alpine
    container_name: ai-security-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=opal
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-security-network
    restart: unless-stopped

volumes:
  n8n_data:
  jenkins_data:
  postgres_data:

networks:
  ai-security-network:
    driver: bridge
